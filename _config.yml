title: Monad Improvement Proposals
description: Monad Improvement Proposals (MIPs)
url: "https://mips.monad.xyz"
baseurl: 
lang: en
timezone: UTC

lsi: false
safe: true
incremental: false
theme: minima
markdown: kramdown
highlighter: none
permalink: /:path

kramdown:
  input: GFM
  math_engine: mathjax
  syntax_highlighter: null

gist:
  noscript: false

defaults:
  -
    scope:
      path: "MIPs"
    values:
      layout: "mip"
  -
    scope:
      path: "MRCs"
    values:
      layout: "mrc"

exclude:
  - .github
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/

include:
  - LICENSE.md

sass:
  quiet_deps: true
  silence_deprecations:
    - import
