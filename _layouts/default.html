<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% assign meta_description = page.description | default: page.excerpt | default: site.description %}
    {% assign meta_description = meta_description | markdownify | strip_html | normalize_whitespace | strip %}
    <meta name="description" content="{{ meta_description | truncate: 160 | escape }}" />
    <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}" />
    <title>Monad Improvement Proposals (MIPs)</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism.min.css" integrity="sha512-tN7Ec6zAFaVSG3TpNAKtk4DOHNpSwKHxxrsiw4GHKESGPs5njn/0sMCUMl2svV4wo4BK/rCP7juYz+zx+l6oeQ==" crossorigin="anonymous" referrerpolicy="no-referrer" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js" integrity="sha512-HiD3V4nv8fcjtouznjT9TqDNDm1EXngV331YGbfVGeKUoH+OLkRTCMzA34ecjlgSQZpdHZupdSrqHY+Hz3l6uQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-python.min.js" integrity="sha512-AKaNmg8COK0zEbjTdMHJAPJ0z6VeNqvRvH4/d5M4sHJbQQUToMBtodq4HaV4fa+WV2UTfoperElm66c9/8cKmQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preload" as="script" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-solidity.min.js" integrity="sha512-cVwDlg8/p6UhSKtcNwXU8mv3QL7uwVilUFE5EtblYWLjAXqyYOh7yXDCkNKJH279fvVe4vzD0OoMX3GokaAU2A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <noscript>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/themes/prism.min.css" integrity="sha512-tN7Ec6zAFaVSG3TpNAKtk4DOHNpSwKHxxrsiw4GHKESGPs5njn/0sMCUMl2svV4wo4BK/rCP7juYz+zx+l6oeQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </noscript>
    <style>
      :root {
        --text: #111827;
        --muted: #6b7280;
        --border: #d1d5db;
        --bg-soft: #f9fafb;
        --link: #2563eb;
      }
      body {
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
        line-height: 1.55;
      }
      h1, h2, h3 {
        line-height: 1.25;
        margin-top: 1.25rem;
      }
      a {
        color: var(--link);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin: 1rem 0;
        font-size: 0.98rem;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 0.55rem 0.65rem;
        vertical-align: top;
      }
      th {
        background: var(--bg-soft);
        text-align: left;
      }
      code {
        background: #f3f4f6;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
      }
      pre {
        background: #f8fafc;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.75rem;
        overflow-x: auto;
      }
      pre code {
        background: transparent;
        padding: 0;
      }
      .highlight pre {
        margin: 0;
        background: transparent;
        border: 0;
      }
      .highlight .c, .highlight .cm, .highlight .c1, .highlight .cs { color: #6a737d; font-style: italic; }
      .highlight .k, .highlight .kc, .highlight .kd, .highlight .kn, .highlight .kp, .highlight .kr, .highlight .kt { color: #d73a49; }
      .highlight .na, .highlight .nc, .highlight .nf, .highlight .fm { color: #6f42c1; }
      .highlight .s, .highlight .sa, .highlight .sb, .highlight .sc, .highlight .dl, .highlight .sd, .highlight .s2, .highlight .se, .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr, .highlight .s1, .highlight .ss { color: #032f62; }
      .highlight .m, .highlight .mb, .highlight .mf, .highlight .mh, .highlight .mi, .highlight .mo { color: #005cc5; }
      .highlight .o, .highlight .ow { color: #d73a49; }
      .highlight .nb, .highlight .bp { color: #005cc5; }
      .highlight .nv, .highlight .vc, .highlight .vg, .highlight .vi { color: #e36209; }
      .highlight .err { color: #b31d28; background-color: #ffeef0; }
      .muted {
        color: var(--muted);
      }
      .page-wrap {
        margin-top: 0.25rem;
      }
      .home-footer {
        margin-top: 2rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--border);
        text-align: center;
      }
      .title-icons {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        margin-left: 0.5rem;
        vertical-align: middle;
      }
      .icon-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.7rem;
        height: 1.7rem;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 7px;
        text-decoration: none;
        transition: color 0.12s ease, border-color 0.12s ease, background 0.12s ease;
      }
      .icon-link svg {
        display: block;
        width: 1rem;
        height: 1rem;
      }
      .icon-link:hover {
        color: var(--link);
        border-color: var(--link);
        background: var(--bg-soft);
        text-decoration: none;
      }
      .icon-link:focus-visible {
        outline: 2px solid var(--link);
        outline-offset: 2px;
      }
      .mip-content blockquote {
        margin: 1rem 0;
        padding: 0.75rem 1rem;
        border-left: 4px solid var(--border);
        background: var(--bg-soft);
        color: var(--muted);
      }
      .mip-content blockquote > :first-child {
        margin-top: 0;
      }
      .mip-content blockquote > :last-child {
        margin-bottom: 0;
      }
      .mip-content blockquote > * + * {
        margin-top: 0.75rem;
      }
      .mip-content img {
        display: block;
        max-width: min(100%, 48rem);
        height: auto;
        margin: 1.5rem auto;
      }
      /* Status & type pills (shared by the index and the MIP/MRC pages). */
      .status-pill {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 500;
        line-height: 1.4;
        border: 1px solid var(--border);
        background: var(--bg-soft);
        color: var(--muted);
        white-space: nowrap;
      }
      .status-pill--draft { background: #fef3c7; border-color: #fde68a; color: #92400e; }
      .status-pill--review { background: #dbeafe; border-color: #bfdbfe; color: #1e40af; }
      .status-pill--last-call { background: #ede9fe; border-color: #ddd6fe; color: #5b21b6; }
      .status-pill--final, .status-pill--living { background: #dcfce7; border-color: #bbf7d0; color: #166534; }
      .status-pill--stagnant, .status-pill--withdrawn { background: #f3f4f6; border-color: #e5e7eb; color: #4b5563; }
      .type-pill {
        display: inline-block;
        padding: 0.15rem 0.55rem;
        border-radius: 6px;
        font-size: 0.82rem;
        font-weight: 500;
        line-height: 1.4;
        border: 1px solid var(--border);
        background: var(--bg-soft);
        color: var(--muted);
        white-space: nowrap;
      }
      .type-pill--standards-track { background: #e0f2fe; border-color: #bae6fd; color: #075985; }
      .type-pill--meta { background: #fae8ff; border-color: #f5d0fe; color: #86198f; }
      .type-pill--informational { background: #f1f5f9; border-color: #e2e8f0; color: #475569; }
      /* Hover/focus tooltip explaining a status or type (definitions per MIP-1). */
      .has-tip {
        position: relative;
        cursor: help;
      }
      .has-tip::after {
        content: attr(data-tip);
        position: absolute;
        left: 0;
        top: calc(100% + 7px);
        z-index: 20;
        width: max-content;
        max-width: min(20rem, 78vw);
        padding: 0.5rem 0.65rem;
        background: #111827;
        color: #f9fafb;
        font-size: 0.78rem;
        font-weight: 400;
        line-height: 1.45;
        white-space: normal;
        text-align: left;
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(17, 24, 39, 0.22);
        opacity: 0;
        transform: translateY(-3px);
        transition: opacity 0.12s ease, transform 0.12s ease;
        pointer-events: none;
      }
      /* On the index the status pill is in the rightmost column, so anchor its
         tooltip to the right so it can't overflow the viewport edge. */
      .proposal-table .status-pill.has-tip::after,
      .proposal-table .type-pill.has-tip::after {
        left: auto;
        right: 0;
      }
      .has-tip:hover::after,
      .has-tip:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }
      .has-tip:focus-visible {
        outline: 2px solid var(--link);
        outline-offset: 2px;
      }
    </style>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/prism.min.js" integrity="sha512-HiD3V4nv8fcjtouznjT9TqDNDm1EXngV331YGbfVGeKUoH+OLkRTCMzA34ecjlgSQZpdHZupdSrqHY+Hz3l6uQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-python.min.js" integrity="sha512-AKaNmg8COK0zEbjTdMHJAPJ0z6VeNqvRvH4/d5M4sHJbQQUToMBtodq4HaV4fa+WV2UTfoperElm66c9/8cKmQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.30.0/components/prism-solidity.min.js" integrity="sha512-cVwDlg8/p6UhSKtcNwXU8mv3QL7uwVilUFE5EtblYWLjAXqyYOh7yXDCkNKJH279fvVe4vzD0OoMX3GokaAU2A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body>
    <main class="page-wrap">
      {{ content }}
    </main>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (window.Prism && typeof Prism.highlightElement === "function") {
          var codeBlocks = document.querySelectorAll("pre > code");

          codeBlocks.forEach(function (code) {
            var pre = code.parentElement;
            if (!pre) {
              return;
            }

            var languageClass = Array.from(code.classList).find(function (cls) {
              return cls.indexOf("language-") === 0;
            });

            if (!languageClass) {
              var wrapper = code.closest("[class*='language-']");
              if (wrapper) {
                languageClass = Array.from(wrapper.classList).find(function (cls) {
                  return cls.indexOf("language-") === 0;
                });
              }
            }

            if (!languageClass || languageClass === "language-plaintext") {
              return;
            }

            code.classList.add(languageClass);
            pre.classList.add(languageClass);
            Prism.highlightElement(code);
          });
        }

        var links = document.querySelectorAll("a[href]");
        links.forEach(function (link) {
          var href = link.getAttribute("href");
          if (!href || href.startsWith("http://") || href.startsWith("https://") || href.startsWith("mailto:") || href.startsWith("#")) {
            return;
          }

          if (/(^|\/)(MIP|MRC)-\d+\.md(#.*)?$/.test(href)) {
            link.setAttribute("href", href.replace(/\.md(?=#|$)/, ""));
          }
        });

        function escapeHtml(value) {
          return value
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function linkifyAuthor(value) {
          var pattern = /([A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,})|@([a-z\d](?:[a-z\d-]{0,38}))/gi;
          var output = "";
          var lastIndex = 0;
          var match;

          while ((match = pattern.exec(value)) !== null) {
            output += escapeHtml(value.slice(lastIndex, match.index));

            if (match[1]) {
              var email = match[1];
              output += '<a href="mailto:' + email + '">' + escapeHtml(email) + '</a>';
            } else if (match[2]) {
              var username = match[2];
              output += '<a href="https://github.com/' + username + '">@' + escapeHtml(username) + '</a>';
            }

            lastIndex = pattern.lastIndex;
          }

          output += escapeHtml(value.slice(lastIndex));
          return output;
        }

        function linkifyMentionsInText(value) {
          var pattern = /(^|[^a-z\d_])@([a-z\d](?:[a-z\d-]{0,38}))/gi;
          var output = "";
          var lastIndex = 0;
          var match;

          while ((match = pattern.exec(value)) !== null) {
            output += escapeHtml(value.slice(lastIndex, match.index));
            output += escapeHtml(match[1]);
            output += '<a href="https://github.com/' + match[2] + '">@' + escapeHtml(match[2]) + '</a>';
            lastIndex = pattern.lastIndex;
          }

          output += escapeHtml(value.slice(lastIndex));
          return output;
        }

        var authorFields = document.querySelectorAll(".author-value");
        authorFields.forEach(function (field) {
          var raw = field.textContent || "";
          field.innerHTML = linkifyAuthor(raw);
        });

        // Attach concise hover/focus explanations (definitions per MIP-1) to
        // every status and type pill, on both the index and the MIP/MRC pages.
        // Runs during DOMContentLoaded, before the index's deferred search
        // captures cell HTML, so the tooltips survive filter/highlight redraws.
        var statusTips = {
          "draft": "First formally tracked stage; a MIP in development, merged into the repository once properly formatted.",
          "review": "The author has marked the MIP ready and is requesting peer review.",
          "last call": "Final review window before Final. The specification is stable; reverts to Review if normative changes are needed.",
          "final": "The finalized standard. Updated only to correct errata or add non-normative clarifications.",
          "stagnant": "Inactive in Draft, Review, or Last Call for 3+ months. Can be resurrected by an author or editor.",
          "withdrawn": "The author(s) have withdrawn the proposal. This is final; the number cannot be reused.",
          "living": "Designed to be continually updated and never reach finality (e.g. MIP-1)."
        };
        var typeTips = {
          "standards track": "A change affecting most or all Monad implementations: the network protocol, block/transaction validity, or application standards.",
          "meta": "A process around Monad (procedures, tooling, or named network upgrades) rather than a change to the protocol itself.",
          "informational": "General guidelines or information for the community. Non-binding, so users and implementers may ignore it."
        };
        function tagTip(el, tip) {
          if (!el || !tip) return;
          el.classList.add("has-tip");
          el.setAttribute("data-tip", tip);
          // Mouse users get the tooltip on hover regardless. Only make a pill
          // keyboard-focusable when it's NOT inside the index's proposal tables,
          // which would otherwise add two tab stops per row (hundreds total).
          // Detail pages have just a couple of pills, where it's worthwhile.
          if (!el.closest(".proposal-table")) {
            el.setAttribute("tabindex", "0");
            // Generated ::after content isn't reliably exposed to assistive
            // tech, so fold the explanation into the accessible name on focus.
            el.setAttribute("aria-label", (el.textContent || "").trim() + ": " + tip);
          }
        }
        document.querySelectorAll(".status-pill").forEach(function (el) {
          tagTip(el, statusTips[(el.textContent || "").trim().toLowerCase()]);
        });
        document.querySelectorAll(".type-pill").forEach(function (el) {
          tagTip(el, typeTips[(el.textContent || "").trim().toLowerCase()]);
        });

        var mipContent = document.querySelector(".mip-content");
        if (mipContent) {
          var walker = document.createTreeWalker(
            mipContent,
            NodeFilter.SHOW_TEXT,
            {
              acceptNode: function (node) {
                var parent = node.parentElement;
                if (!parent) {
                  return NodeFilter.FILTER_REJECT;
                }

                var tag = parent.tagName;
                if (tag === "A" || tag === "CODE" || tag === "PRE" || tag === "SCRIPT" || tag === "STYLE") {
                  return NodeFilter.FILTER_REJECT;
                }

                if (!node.nodeValue || node.nodeValue.indexOf("@") === -1) {
                  return NodeFilter.FILTER_REJECT;
                }

                return NodeFilter.FILTER_ACCEPT;
              }
            }
          );

          var textNodes = [];
          var current;
          while ((current = walker.nextNode())) {
            textNodes.push(current);
          }

          textNodes.forEach(function (node) {
            var raw = node.nodeValue || "";
            var linked = linkifyMentionsInText(raw);
            if (linked === escapeHtml(raw)) {
              return;
            }

            var replacement = document.createElement("span");
            replacement.innerHTML = linked;
            node.parentNode.replaceChild(replacement, node);
          });
        }
      });

      // Prefetch selected internal links on hover or focus
      var prefetched = new Set();
      function maybePrefetchLink(link) {
        var href = link.getAttribute("href");
        if (!href || href === "#") return;
        if (!link.hasAttribute("data-prefetch-on-hover") && !/(MIP|MRC)-\d+/.test(href)) return;
        try {
          var url = new URL(href, location.href);
        } catch (_) {
          return;
        }
        if ((url.protocol !== "http:" && url.protocol !== "https:") || url.origin !== location.origin) return;
        if (prefetched.has(url.href)) return;
        prefetched.add(url.href);
        var prefetchLink = document.createElement("link");
        prefetchLink.rel = "prefetch";
        prefetchLink.href = url.href;
        document.head.appendChild(prefetchLink);
      }

      ["mouseover", "focusin"].forEach(function (eventName) {
        document.addEventListener(eventName, function (e) {
          var target = e.target;
          if (!(target instanceof Element)) return;
          var link = target.closest("a[href]");
          if (!link) return;
          maybePrefetchLink(link);
        });
      });
    </script>
  </body>
</html>
